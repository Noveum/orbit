apiVersion: v1
kind: Service
metadata:
  name: orbit-redis
  namespace: orbit
  labels:
    app.kubernetes.io/name: orbit-redis
    app.kubernetes.io/part-of: orbit
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: orbit-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orbit-redis
  namespace: orbit
  labels:
    app.kubernetes.io/name: orbit-redis
    app.kubernetes.io/part-of: orbit
spec:
  serviceName: orbit-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orbit-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orbit-redis
        app.kubernetes.io/part-of: orbit
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
      volumes:
        - name: config
          emptyDir:
            medium: Memory
      containers:
        - name: redis
          image: redis:8-alpine
          command:
            - sh
            - -c
            - |
              set -eu
              umask 077
              {
                printf 'requirepass %s\n' "$REDIS_PASSWORD"
                printf 'appendonly yes\n'
                printf 'maxmemory 384mb\n'
                printf 'maxmemory-policy noeviction\n'
              } > /etc/redis/redis.conf
              exec redis-server /etc/redis/redis.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orbit-redis
                  key: REDIS_PASSWORD
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: orbit-redis
                  key: REDIS_PASSWORD
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 8Gi
