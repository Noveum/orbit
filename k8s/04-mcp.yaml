apiVersion: v1
kind: Service
metadata:
  name: orbit-mcp
  namespace: orbit
  labels:
    app.kubernetes.io/name: orbit-mcp
    app.kubernetes.io/part-of: orbit
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: orbit-mcp
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbit-mcp
  namespace: orbit
  labels:
    app.kubernetes.io/name: orbit-mcp
    app.kubernetes.io/part-of: orbit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orbit-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orbit-mcp
        app.kubernetes.io/part-of: orbit
    spec:
      serviceAccountName: orbit-app
      terminationGracePeriodSeconds: 60
      volumes:
        - name: rds-ca
          configMap:
            name: orbit-rds-ca
      containers:
        - name: orbit-mcp
          image: __ECR_REGISTRY__/orbit-mcp:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/bin/doppler", "run", "--", "bun", "dist/index.js"]
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: orbit-doppler-token
                  key: DOPPLER_TOKEN
            - name: NODE_ENV
              value: production
            - name: MCP_PORT
              value: "3200"
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/rds/us-east-1-bundle.pem
          volumeMounts:
            - name: rds-ca
              mountPath: /etc/ssl/rds
              readOnly: true
          ports:
            - name: http
              containerPort: 3200
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
