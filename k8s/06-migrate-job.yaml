apiVersion: batch/v1
kind: Job
metadata:
  generateName: orbit-migrate-
  namespace: orbit
  labels:
    app.kubernetes.io/name: orbit-migrate
    app.kubernetes.io/part-of: orbit
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orbit-migrate
        app.kubernetes.io/part-of: orbit
    spec:
      serviceAccountName: orbit-app
      restartPolicy: Never
      volumes:
        - name: rds-ca
          configMap:
            name: orbit-rds-ca
      containers:
        - name: orbit-migrate
          image: __ECR_REGISTRY__/orbit-migrate:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: orbit-doppler-token
                  key: DOPPLER_TOKEN
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/rds/us-east-1-bundle.pem
          volumeMounts:
            - name: rds-ca
              mountPath: /etc/ssl/rds
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
