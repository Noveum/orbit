apiVersion: v1
kind: Service
metadata:
  name: orbit-realtime
  namespace: orbit
  labels:
    app.kubernetes.io/name: orbit-realtime
    app.kubernetes.io/part-of: orbit
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: orbit-realtime
  ports:
    - name: http
      port: 80
      targetPort: ws
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbit-realtime
  namespace: orbit
  labels:
    app.kubernetes.io/name: orbit-realtime
    app.kubernetes.io/part-of: orbit
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orbit-realtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orbit-realtime
        app.kubernetes.io/part-of: orbit
    spec:
      serviceAccountName: orbit-app
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: orbit-realtime
      containers:
        - name: orbit-realtime
          image: __ECR_REGISTRY__/orbit-realtime:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/bin/doppler", "run", "--", "node", "dist/index.js"]
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: orbit-doppler-token
                  key: DOPPLER_TOKEN
            - name: NODE_ENV
              value: production
            - name: REALTIME_PORT
              value: "3100"
          ports:
            - name: ws
              containerPort: 3100
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: ws
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: ws
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: ws
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: orbit-realtime
  namespace: orbit
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orbit-realtime
