name: orbit

services:
  postgres:
    image: postgres:18-alpine
    container_name: orbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
      POSTGRES_DB: orbit
    ports:
      - "5434:5432"
    volumes:
      - orbit-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    container_name: orbit-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - orbit-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: orbit-minio
    restart: unless-stopped
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: orbitminio
      MINIO_ROOT_PASSWORD: orbitminio
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - orbit-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-bucket:
    image: minio/mc:latest
    container_name: orbit-minio-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set orbit http://minio:9000 orbitminio orbitminio
        mc mb --ignore-existing orbit/orbit-uploads

volumes:
  orbit-postgres:
  orbit-redis:
  orbit-minio:
