pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    comments:
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts}"
      run: bun scripts/strip-comments.ts --check {staged_files}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    lint:
      run: bun run lint
